<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages — лабораторная</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      padding: 1.5rem;
    }
    main {
      max-width: 32rem;
      text-align: center;
      padding: 2.5rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; color: #38bdf8; }
    p { line-height: 1.6; color: #94a3b8; margin-bottom: 1rem; }
    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      background: #22c55e33;
      color: #4ade80;
      font-size: 0.875rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Деплой через GitHub Actions</h1>
    <p>
      Статический сайт развёрнут автоматически с помощью workflow
      <code>peaceiris/actions-gh-pages</code>.
    </p>
    <span class="badge">GitHub Pages работает</span>
  </main>
</body>
</html>
